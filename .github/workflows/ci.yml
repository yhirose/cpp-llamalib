name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: build/models
          key: model-gemma-3-1b-it-Q4_K_M

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -DMODEL_PATH=dummy -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --config Release -j4
